name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}


  # ─────────────────
  # BUILD
  # ─────────────────
jobs:
  build:
    name: "Build Docker image"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push CI image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ci
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for production image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # ─────────────────
  # TESTS
  # ─────────────────
  tests:
    name: "Tests unit + coverage"
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create results directory on the runner
        run: mkdir -p ${{ github.workspace }}/test-results

      - name: Run tests JUnit report
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/test-results:/app/test-results \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci-${{ github.sha }} \
            sh -c "mkdir -p /app/test-results && bun run test:ci"

      - name: Run tests coverage summary
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/test-results:/app/coverage \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci-${{ github.sha }} \
            bun test:coverage

      - name: Upload test results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ${{ github.workspace }}/test-results/

      - name: Publish test report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: ${{ github.workspace }}/test-results/junit.xml
          check_name: Unit Tests
          fail_on_failure: true

      - name: Install lcov
        run: sudo apt-get install -y lcov

      - name: Publish coverage report
        uses: zgosalvez/github-actions-report-lcov@v4
        if: always()
        with:
          coverage-files: ${{ github.workspace }}/test-results/lcov.info
          minimum-coverage: 0
          github-token: ${{ secrets.GITHUB_TOKEN }}


  # ─────────────────
  # QUALITY
  # ─────────────────
  quality:
    name: "Quality Biome lint & format"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome CI check (lint + format)
        run: bun run lint:ci

  # ─────────────────
  # DEPLOY
  # Cette étape n'a pas pu être testé car je n'avais pas de serveur pour faire le déploiement.
  # ─────────────────
  deploy:
    name: "Deploy production"
    needs: [tests, quality]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: production
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          envs: GHCR_TOKEN,IMAGE,ACTOR
          script: |
            set -e

            echo "==> Authenticating to GHCR"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$ACTOR" --password-stdin

            echo "==> Pulling image $IMAGE"
            docker pull "$IMAGE"

            echo "==> Stopping previous container (if any)"
            docker stop service_booking 2>/dev/null || true
            docker rm   service_booking 2>/dev/null || true

            echo "==> Starting new container"
            docker run -d \
              --name service_booking \
              --restart unless-stopped \
              -p 3001:3001 \
              --env-file /srv/resa/.env \
              "$IMAGE"

            echo "==> Cleaning up dangling images"
            docker image prune -f

            echo "==> Health check"
            sleep 3
            curl -sf http://localhost:3001/ || \
              (echo "Health check failed"; docker logs --tail 50 service_booking; exit 1)

            echo "==> Deployment complete"
