name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# ──────────────────────────────────────────────────────────────────────────────
# Job 1 — BUILD
# Builds two Docker images from the multi-stage Dockerfile:
#   • ci      → stage "ci"     (source + deps + tests) — used by job 2
#   • latest  → stage "runner" (minimal production image)
# Images are pushed to the GitHub Container Registry (GHCR) and cached with
# the GitHub Actions cache backend to speed up subsequent runs.
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  build:
    name: "Build — Docker image"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push CI image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ci
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for production image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2 — TESTS
  # Runs the test suite inside the CI Docker image built in job 1.
  # Two runs are performed:
  #   1. JUnit XML reporter → uploaded as an artifact and rendered as a
  #      GitHub check via dorny/test-reporter.
  #   2. Coverage reporter  → text summary visible in the job logs.
  # ────────────────────────────────────────────────────────────────────────────
  tests:
    name: "Tests — unit + coverage"
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      checks: write  # required by dorny/test-reporter to create check runs

    steps:
      # dorny/test-reporter requires a git checkout to resolve source file paths.
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create results directory on the runner
        run: mkdir -p ${{ github.workspace }}/test-results

      # bun test --reporter=junit requires --reporter-outfile (cannot use stdout
      # redirect). The directory is volume-mounted so the file lands on the runner.
      - name: Run tests — JUnit report
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/test-results:/app/test-results \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci-${{ github.sha }} \
            sh -c "mkdir -p /app/test-results && bun run test:ci"

      # Second run to display coverage stats in the job log.
      - name: Run tests — coverage summary
        run: |
          docker run --rm \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ci-${{ github.sha }} \
            bun test:coverage

      # Always upload the artifact, even when tests fail, so the report is
      # available for inspection.
      - name: Upload test results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ${{ github.workspace }}/test-results/

      # Renders the JUnit XML as a native GitHub check with per-test details.
      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Tests
          path: ${{ github.workspace }}/test-results/junit.xml
          reporter: java-junit
          fail-on-error: true

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3 — QUALITY
  # Static analysis using Biome (linter + formatter).
  # Runs directly on the runner (no Docker) for speed; the Biome binary is
  # already declared as a dev dependency and installed via bun install.
  # The --reporter=github flag emits ::error annotations visible inline in PRs.
  # ────────────────────────────────────────────────────────────────────────────
  quality:
    name: "Quality — Biome lint & format"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome CI check (lint + format)
        run: bun run lint:ci

  # ────────────────────────────────────────────────────────────────────────────
  # Job 4 — DEPLOY
  # Runs only on direct pushes to main, after both tests and quality pass.
  #
  # Required GitHub secrets (Settings → Secrets → Actions):
  #   DEPLOY_HOST      — server IP or hostname
  #   DEPLOY_USER      — SSH username (e.g. deploy)
  #   DEPLOY_SSH_KEY   — private SSH key (RSA/Ed25519); add the public key to
  #                      ~/.ssh/authorized_keys on the server
  #
  # Required on the server:
  #   - Docker installed and running
  #   - /srv/resa/.env file with DATABASE_URL, STRIPE_* variables
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: "Deploy — production"
    needs: [tests, quality]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    permissions:
      contents: read
      packages: read

    steps:
      # Pass the image reference and a GHCR read token to the remote session
      # via appleboy/ssh-action's `envs` mechanism so they are never echoed
      # in plain text in the workflow logs.
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          envs: GHCR_TOKEN,IMAGE,ACTOR
          script: |
            set -e

            echo "==> Authenticating to GHCR"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$ACTOR" --password-stdin

            echo "==> Pulling image $IMAGE"
            docker pull "$IMAGE"

            echo "==> Stopping previous container (if any)"
            docker stop service_booking 2>/dev/null || true
            docker rm   service_booking 2>/dev/null || true

            echo "==> Starting new container"
            docker run -d \
              --name service_booking \
              --restart unless-stopped \
              -p 3001:3001 \
              --env-file /srv/resa/.env \
              "$IMAGE"

            echo "==> Cleaning up dangling images"
            docker image prune -f

            echo "==> Health check"
            sleep 3
            curl -sf http://localhost:3001/ || \
              (echo "Health check failed"; docker logs --tail 50 service_booking; exit 1)

            echo "==> Deployment complete"
